name: tooldrift MCP drift check

# Example CI wiring: export your live MCP server's tool list (however your
# stack does that -- an internal script calling `tools/list`, or a fixture
# file checked into the repo) to tools_export.json, then run tooldrift
# against the last trusted baseline. Commit an updated baseline only after
# a human has reviewed and approved the drift.

on:
  pull_request:
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install tooldrift
        run: pip install -e .

      - name: Export current MCP tool definitions
        run: |
          # Replace this with your real export step, e.g.:
          #   your-mcp-cli tools/list --json > tools_export.json
          cp examples/tools_export.json tools_export.json

      - name: Check for tool drift against trusted baseline
        run: |
          python -m tooldrift.cli check tools_export.json \
            --baseline baseline.trusted.json
        # exit code 2 (critical) fails the build automatically;
        # exit code 1 (high) also fails here -- change to `|| true`
        # if you'd rather warn-only on high-severity findings.
